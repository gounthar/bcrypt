---
name: riscv64 CI

"on":
  push:
    branches:
      - feat/riscv64-ci
  workflow_dispatch:

jobs:
  linux-riscv64:
    runs-on: ubuntu-24.04-riscv
    name: "tests on riscv64 (RISE native runner)"
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src/_bcrypt/target/
          key: riscv64-cargo-${{ hashFiles('src/_bcrypt/Cargo.lock') }}
          restore-keys: riscv64-cargo-

      - name: Install Python tooling
        run: /opt/python-3.12/bin/python3.12 -m pip install --user nox uv

      - name: Run tests (timed)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          time nox -s tests -v
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/src/_bcrypt/target/
